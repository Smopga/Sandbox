<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sandbox Pro</title>
  <style>
    :root {
      --bg: #121214;
      --panel: #1e1e24;
      --accent: #00e5ff;
      --text: #e0e0e0;
      --btn-hover: #2a2a35;
      --active: #00b8d4;
      --grid-border: #333;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Segoe UI', system-ui, sans-serif;
      display: flex;
      flex-direction: column;
      height: 100vh;
      overflow: hidden;
    }
    header {
      padding: 10px 15px;
      background: var(--panel);
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-bottom: 1px solid #333;
    }
    h1 { font-size: 1.2rem; color: var(--accent); letter-spacing: 1px; }
    .controls { display: flex; gap: 8px; }
    button {
      background: #2d2d3a;
      border: 1px solid #444;
      color: var(--text);
      padding: 6px 10px;
      border-radius: 4px;
      cursor: pointer;
      font-size: 0.85rem;
      transition: all 0.2s;
    }
    button:hover { background: var(--btn-hover); border-color: var(--accent); }
    button.active { background: var(--accent); color: #000; border-color: var(--accent); }
    
    main {
      flex: 1;
      display: flex;
      overflow: hidden;
    }
    #canvas-container {
      flex: 1;
      display: flex;
      justify-content: center;
      align-items: center;
      background: #0a0a0c;
      position: relative;
    }
    canvas {
      background: #000;
      box-shadow: 0 0 15px rgba(0,0,0,0.5);
      image-rendering: pixelated;
      max-width: 100%;
      max-height: 100%;
    }
    .sidebar {
      width: 220px;
      background: var(--panel);
      border-left: 1px solid #333;
      padding: 10px;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }
    .section { background: #18181c; padding: 8px; border-radius: 6px; }
    .section h3 { font-size: 0.8rem; margin-bottom: 6px; color: #888; text-transform: uppercase; }
    .materials { display: grid; grid-template-columns: repeat(3, 1fr); gap: 5px; }
    .mat-btn {
      background: #25252d;
      border: 1px solid #333;
      color: #ccc;
      padding: 6px 2px;
      font-size: 0.7rem;
      border-radius: 3px;
      cursor: pointer;
      text-align: center;
      transition: all 0.15s;
    }
    .mat-btn:hover { background: #333; }
    .mat-btn.active { background: var(--accent); color: #000; border-color: var(--accent); }
    
    .slider-group { display: flex; flex-direction: column; gap: 4px; }
    input[type="range"] { width: 100%; accent-color: var(--accent); }
    .stats { font-size: 0.75rem; color: #888; display: flex; justify-content: space-between; }
    .reactions { font-size: 0.7rem; color: #aaa; line-height: 1.4; }
    
    .tooltip {
      position: absolute;
      background: rgba(0,0,0,0.8);
      color: #fff;
      padding: 4px 8px;
      border-radius: 4px;
      font-size: 0.7rem;
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.2s;
    }
    @media (max-width: 768px) {
      main { flex-direction: column; }
      .sidebar { width: 100%; height: auto; border-left: none; border-top: 1px solid #333; }
      canvas { width: 100%; height: auto; }
    }
  </style>
</head>
<body>
  <header>
    <h1>SANDBOX PRO</h1>
    <div class="controls">
      <button id="btn-pause">⏸ Pause</button>
      <button id="btn-clear">✕ Leeren</button>
      <button id="btn-save">💾 Speichern</button>
      <button id="btn-load">📂 Laden</button>
    </div>
  </header>

  <main>
    <div id="canvas-container">
      <canvas id="sim" width="320" height="240"></canvas>
      <div class="tooltip" id="tooltip"></div>
    </div>

    <aside class="sidebar">
      <div class="section">
        <h3>Materialien</h3>
        <div class="materials" id="mat-grid"></div>
      </div>

      <div class="section">
        <h3>Werkzeug</h3>
        <div class="slider-group">
          <label>Pinselgröße: <span id="brush-val">5</span> px</label>
          <input type="range" id="brush-size" min="1" max="20" value="5">
        </div>
      </div>

      <div class="section">
        <h3>Statistiken</h3>
        <div class="stats" id="stats">Partikel: 0 | FPS: 0 | Explosionen: 0</div>
      </div>

      <div class="section">
        <h3>Reaktionen</h3>
        <div class="reactions" id="reactions-list"></div>
      </div>
      
      <div class="section">
        <h3>Shortcuts</h3>
        <div style="font-size: 0.7rem; color: #777; line-height: 1.4;">
          S Sand | W Wasser | F Feuer | I Eis | A Lava | L Schleim<br>
          C Säure | D Dampf | V Virus | H Loch | T TNT | N Nuke<br>
          ⎵ Pause | E Radierer | R Wand
        </div>
      </div>
    </aside>
  </main>

  <script>
    // === KONFIGURATION ===
    const WIDTH = 320;
    const HEIGHT = 240;
    const canvas = document.getElementById('sim');
    const ctx = canvas.getContext('2d');
    const imageData = ctx.createImageData(WIDTH, HEIGHT);
    const buf32 = new Uint32Array(imageData.data.buffer);
    
    // Partikel-Typen (0 = Leer)
    const TYPES = {
      0: { name: 'Leer', color: 0x00000000 },
      1: { name: 'Sand', color: 0xFFE6C7FF },
      2: { name: 'Wasser', color: 0x0099FFFF },
      3: { name: 'Wand', color: 0x808080FF },
      4: { name: 'Feuer', color: 0xFF4500FF },
      5: { name: 'Eis', color: 0xCCFFFFFF },
      6: { name: 'Lava', color: 0xFF5500FF },
      7: { name: 'Öl', color: 0x2A1A0AFF },
      8: { name: 'Säure', color: 0x00FF00FF },
      9: { name: 'Dampf', color: 0xE0E0E099 },
      10: { name: 'Rauch', color: 0x33333399 },
      11: { name: 'Plasma', color: 0x9900FFFF },
      12: { name: 'Schleim', color: 0x00CC66FF },
      13: { name: 'Virus', color: 0x800080FF },
      14: { name: 'Schwarzes Loch', color: 0x000000FF },
      15: { name: 'Quelle', color: 0x0088FFFF },
      16: { name: 'TNT', color: 0xFF0000FF },
      17: { name: 'Rakete', color: 0xAAAAAAFF },
      18: { name: 'Nuke', color: 0x330000FF },
      19: { name: 'Feuerball', color: 0xFFAA00FF }
    };

    let grid = new Uint8Array(WIDTH * HEIGHT);
    let nextGrid = new Uint8Array(WIDTH * HEIGHT);
    let selectedType = 1;
    let brushSize = 5;
    let isPaused = false;
    let isMouseDown = false;
    let mouseX = 0, mouseY = 0;
    let particles = 0;
    let explosions = 0;
    let lastTime = performance.now();
    let fps = 0;
    let frameCount = 0;

    // === UI INITIALISIERUNG ===
    const matGrid = document.getElementById('mat-grid');
    Object.entries(TYPES).forEach(([id, type]) => {
      if (id == 0) return;
      const btn = document.createElement('button');
      btn.className = 'mat-btn' + (id == selectedType ? ' active' : '');
      btn.textContent = type.name;
      btn.dataset.id = id;
      btn.addEventListener('click', () => selectMaterial(id));
      matGrid.appendChild(btn);
    });

    document.getElementById('reactions-list').innerHTML = `
      💧+🔥=☁️ Dampf | 💧+🌋=🪨 Stein<br>
      🧪+🪨=💨 Gas | 🔥+🛢️=💥 Explosion<br>
      ⚡+⚡=✨ Plasma | 🕳️=Alles anziehen
    `;

    document.getElementById('brush-size').addEventListener('input', e => {
      brushSize = parseInt(e.target.value);
      document.getElementById('brush-val').textContent = brushSize;
    });

    document.getElementById('btn-pause').addEventListener('click', togglePause);
    document.getElementById('btn-clear').addEventListener('click', clearGrid);
    document.getElementById('btn-save').addEventListener('click', saveGame);
    document.getElementById('btn-load').addEventListener('click', loadGame);

    function selectMaterial(id) {
      selectedType = parseInt(id);
      document.querySelectorAll('.mat-btn').forEach(b => b.classList.toggle('active', b.dataset.id == id));
    }

    function togglePause() {
      isPaused = !isPaused;
      document.getElementById('btn-pause').textContent = isPaused ? '▶ Weiter' : '⏸ Pause';
    }

    function clearGrid() {
      grid.fill(0);
      nextGrid.fill(0);
      particles = 0; explosions = 0;
    }

    function saveGame() {
      localStorage.setItem('sandbox_save', Array.from(grid).join(','));
      alert('Gespeichert!');
    }

    function loadGame() {
      const data = localStorage.getItem('sandbox_save');
      if (!data) return alert('Kein Spielstand gefunden.');
      const arr = data.split(',').map(Number);
      if (arr.length === WIDTH * HEIGHT) {
        grid = new Uint8Array(arr);
        nextGrid = new Uint8Array(arr);
        updateStats();
      }
    }

    // === EINGABE ===
    function getCanvasPos(e) {
      const rect = canvas.getBoundingClientRect();
      const scaleX = WIDTH / rect.width;
      const scaleY = HEIGHT / rect.height;
      const clientX = e.touches ? e.touches[0].clientX : e.clientX;
      const clientY = e.touches ? e.touches[0].clientY : e.clientY;
      return {
        x: Math.floor((clientX - rect.left) * scaleX),
        y: Math.floor((clientY - rect.top) * scaleY)
      };
    }

    canvas.addEventListener('mousedown', e => { isMouseDown = true; const p = getCanvasPos(e); mouseX = p.x; mouseY = p.y; paint(); });
    canvas.addEventListener('mousemove', e => { const p = getCanvasPos(e); mouseX = p.x; mouseY = p.y; if(isMouseDown) paint(); });
    canvas.addEventListener('mouseup', () => isMouseDown = false);
    canvas.addEventListener('mouseleave', () => isMouseDown = false);
    canvas.addEventListener('touchstart', e => { e.preventDefault(); isMouseDown = true; const p = getCanvasPos(e); mouseX = p.x; mouseY = p.y; paint(); }, {passive: false});
    canvas.addEventListener('touchmove', e => { e.preventDefault(); const p = getCanvasPos(e); mouseX = p.x; mouseY = p.y; if(isMouseDown) paint(); }, {passive: false});
    canvas.addEventListener('touchend', () => isMouseDown = false);

    window.addEventListener('keydown', e => {
      if (e.repeat) return;
      const map = { 's':1, 'w':2, 'f':4, 'i':5, 'a':6, 'l':12, 'c':8, 'd':9, 'v':13, 'h':14, 't':16, 'k':17, 'q':15, 'e':0, 'n':18, ' ':0 };
      if (e.key === ' ') { togglePause(); return; }
      if (map[e.key.toLowerCase()] !== undefined) selectMaterial(map[e.key.toLowerCase()]);
    });

    function paint() {
      if (isPaused && selectedType === 0) return;
      const r = brushSize;
      for (let dy = -r; dy <= r; dy++) {
        for (let dx = -r; dx <= r; dx++) {
          if (dx*dx + dy*dy > r*r) continue;
          const nx = mouseX + dx;
          const ny = mouseY + dy;
          if (nx >= 0 && nx < WIDTH && ny >= 0 && ny < HEIGHT) {
            const idx = ny * WIDTH + nx;
            if (selectedType === 0) { grid[idx] = 0; nextGrid[idx] = 0; }
            else if (grid[idx] === 0) { grid[idx] = selectedType; nextGrid[idx] = selectedType; }
          }
        }
      }
    }

    // === PHYSIK ENGINE ===
    function idx(x, y) { return y * WIDTH + x; }
    function inBounds(x, y) { return x >= 0 && x < WIDTH && y >= 0 && y < HEIGHT; }
    function isEmpty(x, y) { return inBounds(x, y) && grid[idx(x, y)] === 0; }
    function isType(x, y, type) { return inBounds(x, y) && grid[idx(x, y)] === type; }

    function update() {
      nextGrid.set(grid);
      particles = 0;

      for (let y = HEIGHT - 1; y >= 0; y--) {
        const dir = Math.random() < 0.5 ? 1 : -1;
        for (let x = 0; x < WIDTH; x++) {
          const px = (dir === 1) ? x : (WIDTH - 1 - x);
          const i = idx(px, y);
          const type = grid[i];
          if (type === 0) continue;
          particles++;

          let nx = px, ny = y;
          let moved = false;

          // Grundregeln pro Typ
          switch(type) {
            case 1: // Sand
              if (isEmpty(px, y + 1)) { ny = y + 1; moved = true; }
              else if (isEmpty(px - 1, y + 1) && Math.random() < 0.5) { nx = px - 1; ny = y + 1; moved = true; }
              else if (isEmpty(px + 1, y + 1) && Math.random() < 0.5) { nx = px + 1; ny = y + 1; moved = true; }
              else if (isType(px, y + 1, 2)) { swap(px, y, px, y + 1); moved = true; }
              break;
            case 2: // Wasser
              if (isEmpty(px, y + 1)) { ny = y + 1; moved = true; }
              else if (isEmpty(px - 1, y + 1)) { nx = px - 1; ny = y + 1; moved = true; }
              else if (isEmpty(px + 1, y + 1)) { nx = px + 1; ny = y + 1; moved = true; }
              else if (isEmpty(px + dir, y)) { nx = px + dir; moved = true; }
              else if (isEmpty(px - dir, y)) { nx = px - dir; moved = true; }
              break;
            case 4: // Feuer
              if (Math.random() < 0.1) { nextGrid[i] = 9; moved = true; } // Dampf
              if (Math.random() < 0.05) { nextGrid[i] = 10; moved = true; } // Rauch
              checkReactions(px, y);
              break;
            case 6: // Lava
              if (Math.random() < 0.3 && isEmpty(px, y + 1)) { ny = y + 1; moved = true; }
              checkReactions(px, y);
              break;
            case 9: // Dampf
            case 10: // Rauch
              if (Math.random() < 0.1) { nextGrid[i] = 0; moved = true; } // Verschwinden
              if (isEmpty(px, y - 1)) { ny = y - 1; moved = true; }
              else if (isEmpty(px + dir, y)) { nx = px + dir; moved = true; }
              else if (isEmpty(px - dir, y)) { nx = px - dir; moved = true; }
              break;
            case 14: // Schwarzes Loch
              if (Math.random() < 0.05) {
                const rx = Math.floor(Math.random() * WIDTH);
                const ry = Math.floor(Math.random() * HEIGHT);
                if (grid[idx(rx, ry)] !== 14) nextGrid[idx(rx, ry)] = 0;
              }
              break;
            case 16: // TNT
              if (isAdjacent(px, y, [4, 6, 19, 11])) { explode(px, y, 4); moved = true; }
              break;
            case 18: // Nuke
              if (isAdjacent(px, y, [4, 6, 19, 11, 16])) { explode(px, y, 8); moved = true; }
              break;
          }

          if (moved && (nx !== px || ny !== y)) {
            nextGrid[idx(nx, ny)] = type;
            nextGrid[i] = 0;
          }
        }
      }
      grid.set(nextGrid);
      updateStats();
    }

    function swap(x1, y1, x2, y2) {
      const t = grid[idx(x1, y1)];
      grid[idx(x2, y2)] = t;
      grid[idx(x1, y1)] = grid[idx(x2, y2)];
    }

    function checkReactions(x, y) {
      const type = grid[idx(x, y)];
      const neighbors = [[0,-1],[0,1],[-1,0],[1,0]];
      for (let n of neighbors) {
        const nx = x + n[0], ny = y + n[1];
        if (!inBounds(nx, ny)) continue;
        const nt = grid[idx(nx, ny)];
        
        if (type === 4 && nt === 2) { nextGrid[idx(nx, ny)] = 9; } // Feuer+Wasser=Dampf
        if (type === 2 && nt === 6) { nextGrid[idx(x, y)] = 3; }   // Wasser+Lava=Stein
        if (type === 8 && nt === 3) { nextGrid[idx(nx, ny)] = 9; } // Säure+Stein=Gas
        if (type === 4 && nt === 7) { explode(nx, ny, 3); }        // Feuer+Öl=Explosion
        if (type === 11 && nt === 11) { nextGrid[idx(nx, ny)] = 4; nextGrid[idx(x, y)] = 4; } // Plasma+Plasma=Feuer
        if (type === 13 && nt > 0 && nt !== 14 && Math.random() < 0.02) { nextGrid[idx(nx, ny)] = 13; } // Virus
      }
    }

    function isAdjacent(x, y, types) {
      const dirs = [[-1,0],[1,0],[0,-1],[0,1]];
      for (let d of dirs) {
        if (types.includes(grid[idx(x+d[0], y+d[1])])) return true;
      }
      return false;
    }

    function explode(cx, cy, radius) {
      explosions++;
      for (let dy = -radius; dy <= radius; dy++) {
        for (let dx = -radius; dx <= radius; dx++) {
          if (dx*dx + dy*dy <= radius*radius) {
            const nx = cx + dx, ny = cy + dy;
            if (inBounds(nx, ny)) {
              nextGrid[idx(nx, ny)] = Math.random() < 0.3 ? 4 : (Math.random() < 0.2 ? 9 : 0);
            }
          }
        }
      }
    }

    function updateStats() {
      document.getElementById('stats').textContent = `Partikel: ${particles} | FPS: ${fps} | Explosionen: ${explosions}`;
    }

    // === RENDERING ===
    function render() {
      const time = performance.now();
      frameCount++;
      if (time - lastTime >= 1000) {
        fps = frameCount;
        frameCount = 0;
        lastTime = time;
      }

      for (let i = 0; i < grid.length; i++) {
        buf32[i] = TYPES[grid[i]].color;
      }
      ctx.putImageData(imageData, 0, 0);
    }

    // === GAME LOOP ===
    function loop() {
      if (!isPaused) update();
      render();
      requestAnimationFrame(loop);
    }

    // Start
    updateStats();
    loop();
  </script>
</body>
</html>
